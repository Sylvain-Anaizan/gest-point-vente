name: Pro SSH Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

      - name: 📥 Composer Install
        run: composer install --no-dev --optimize-autoloader

      - name: 🛠️ Build React (Vite)
        run: |
          npm install
          npm run build

      - name: 🚀 Sync Files (Rsync)
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          # Correction : Les exclusions se mettent ICI, pas dans un champ 'exclude'
          switches: -avzr --delete --exclude='.git/' --exclude='.github/' --exclude='node_modules/' --exclude='storage/' --exclude='.env'
          path: ./
          remote_path: /home/anaizan1/stock.anaizancloud.com
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_port: ${{ secrets.SSH_PORT }}

      - name: ⚙️ Post-Deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/anaizan1/stock.anaizancloud.com
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
